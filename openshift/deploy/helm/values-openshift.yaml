# OpenShift-specific value overrides for the AIRA v2.0 Helm chart.
# Used by openshift/deploy/helm/deploy-openshift.sh.
#
# See openshift/docs/deploy-openshift.md for full documentation.

aiq:
  # appname controls the namespace for all resources via the aiq.namespace helper.
  # The deploy script overrides this via --set aiq.appname=<your-namespace>.
  appname: aiq

  project:
    # 'kind' makes aiq.namespace = appname (avoids the ns- prefix convention).
    deploymentTarget: kind
    orientation: external

  # Shared secret containing NVIDIA_API_KEY, TAVILY_API_KEY, DB_USER_NAME, DB_USER_PASSWORD.
  # Pre-created by the deploy script with Helm ownership labels.
  sharedSecrets:
    enabled: true
    autoMount: true

  secretEnvAsEnv: false

  apps:
    backend:
      enabled: true
      image:
        repository: nvcr.io/nvidia/blueprint/aiq-agent
        tag: 2603.15.ext.rc11
        pullPolicy: IfNotPresent
      imagePullSecrets:
        - name: ngc-secret
      # CONFIG_FILE selects the knowledge mode. The deploy script sets this via --set
      # based on KNOWLEDGE_MODE (llamaindex or frag).
      #   LlamaIndex: configs/config_web_default_llamaindex.yml (default, self-contained)
      #   FRAG:       configs/config_web_frag.yml (requires RAG Blueprint)
      ingress:
        enabled: false
      podSecurityContext: null

    frontend:
      enabled: true
      image:
        repository: nvcr.io/nvidia/blueprint/aiq-frontend
        tag: 2603.15.ext.rc11
        pullPolicy: IfNotPresent
      imagePullSecrets:
        - name: ngc-secret
      ingress:
        enabled: false
      podSecurityContext: null

    postgres:
      enabled: true
      podSecurityContext: null
