# =============================================================================
# Test config: Deep Researcher with MCP tool integration (basic, no auth)
# This extends config_web_frag.yml by adding an MCP tool via mcp_tool_wrapper.
#
# The MCP tool connects to an external MCP server (for example, a financial
# data service) and makes it available to the deep research agents alongside
# the existing web search, paper search, and knowledge search tools.
#
# Prerequisites:
#   - An MCP server running at the configured URL
#   - NeMo Agent toolkit with MCP support: uv pip install "nvidia-nat[mcp]"
# =============================================================================

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: INFO

  front_end:
    _type: aiq_api
    runner_class: aiq_api.plugin.AIQAPIWorker
    db_url: ${NAT_JOB_STORE_DB_URL:-sqlite+aiosqlite:///./jobs.db}
    expiry_seconds: 86400
    cors:
      allow_origin_regex: 'http://localhost(:\d+)?|http://127.0.0.1(:\d+)?'
      allow_methods:
        - GET
        - POST
        - DELETE
        - OPTIONS
      allow_headers:
        - "*"
      allow_credentials: true
      expose_headers:
        - "*"

llms:
  nemotron_llm_intent:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.5
    top_p: 0.9
    max_tokens: 4096
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  nemotron_nano_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.1
    top_p: 0.3
    max_tokens: 16384
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  gpt_oss_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    base_url: https://integrate.api.nvidia.com/v1
    temperature: 1.0
    top_p: 1.0
    max_tokens: 256000
    api_key: ${NVIDIA_API_KEY}
    max_retries: 10

  nemotron_super_llm:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 1.0
    top_p: 1.0
    max_tokens: 128000
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

functions:
  web_search_tool:
    _type: tavily_web_search
    max_results: 5
    max_content_length: 1000

  advanced_web_search_tool:
    _type: tavily_web_search
    max_results: 2
    advanced_search: true

  # Knowledge Retrieval (see sources/knowledge_layer/KNOWLEDGE-LAYER-SETUP.md)
  knowledge_search:
    _type: knowledge_retrieval
    backend: foundational_rag
    collection_name: ${COLLECTION_NAME:-test_collection}
    top_k: 5
    rag_url: ${RAG_SERVER_URL:-http://localhost:8081}
    ingest_url: ${RAG_INGEST_URL:-http://localhost:8082}
    timeout: 300

  # Paper Search (optional - requires SERPER_API_KEY)
  # Uncomment the block below and set SERPER_API_KEY to enable academic paper search.
  # paper_search_tool:
  #   _type: paper_search
  #   max_results: 5
  #   serper_api_key: ${SERPER_API_KEY}

  # =========================================================================
  # MCP Tool: Connect to an external MCP server
  # This example wraps a single tool from a remote MCP server using
  # mcp_tool_wrapper. The MCP server must be running and serving the tool
  # at the specified URL.
  #
  # To add tools from your own MCP server:
  #   1. Replace the url with your MCP server's endpoint
  #   2. Replace mcp_tool_name with the name of the tool on the MCP server
  #   3. Update the description so the agent knows when to use this tool
  #   4. Choose the appropriate transport: streamable-http (recommended) or sse
  #   5. Add the tool name to the relevant agents' tools lists below
  # =========================================================================
  mcp_financial_data:
    _type: mcp_tool_wrapper
    url: ${MCP_SERVER_URL:-http://localhost:9901/mcp}
    transport: "streamable-http"
    mcp_tool_name: "get_financial_data"
    description: "Retrieves financial data and market information. Use this tool when the research query involves financial analysis, stock data, or market trends."

  intent_classifier:
    _type: intent_classifier
    llm: nemotron_llm_intent
    tools:
      - web_search_tool
      # - paper_search_tool  # Uncomment if SERPER_API_KEY is set
      - knowledge_search
      - mcp_financial_data

  clarifier_agent:
    _type: clarifier_agent
    llm: nemotron_super_llm
    planner_llm: nemotron_super_llm
    tools:
      - web_search_tool
      - knowledge_search
      - mcp_financial_data
    max_turns: 3
    enable_plan_approval: true
    log_response_max_chars: 2000
    verbose: true

  shallow_research_agent:
    _type: shallow_research_agent
    llm: nemotron_nano_llm
    tools:
      - web_search_tool
      - knowledge_search
      - mcp_financial_data
    max_llm_turns: 10
    max_tool_iterations: 5

  deep_research_agent:
    _type: deep_research_agent
    orchestrator_llm: gpt_oss_llm
    researcher_llm: nemotron_super_llm
    planner_llm: gpt_oss_llm
    max_loops: 2
    tools:
      # - paper_search_tool  # Uncomment if SERPER_API_KEY is set
      - advanced_web_search_tool
      - knowledge_search
      - mcp_financial_data

workflow:
  _type: chat_deepresearcher_agent
  enable_escalation: true
  enable_clarifier: true
  use_async_deep_research: true
  checkpoint_db: ${AIQ_CHECKPOINT_DB:-./checkpoints.db}
